apiVersion: apps/v1
kind: Deployment
metadata: { name: envdoctor, labels: { app: envdoctor } }
spec:
  replicas: 1
  selector: { matchLabels: { app: envdoctor } }
  template:
    metadata: { labels: { app: envdoctor } }
    spec:
      containers:
        - name: envdoctor
          image: ghcr.io/cognis-digital/envdoctor:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: envdoctor }
spec:
  selector: { app: envdoctor }
  ports: [{ port: 80, targetPort: 8000 }]
